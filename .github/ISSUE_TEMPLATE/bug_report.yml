name: Bug Report
description: Report a bug or crash
labels: ["bug"]
body:
  - type: dropdown
    id: loader
    attributes:
      label: Mod Loader
      options:
        - Fabric
        - NeoForge
    validations:
      required: true
  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      placeholder: "26.1.2"
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      placeholder: "26.1.2.1"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Mount a Happy Ghast
        2. Press G to charge
        3. ...
  - type: textarea
    id: logs
    attributes:
      label: Crash log / latest.log
      description: Paste the relevant log output here
      render: text
