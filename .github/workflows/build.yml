name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        run: ./gradlew build --stacktrace --parallel

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ghastrider-fabric
          path: fabric/build/libs/!(*-sources|*-javadoc).jar

      - name: Upload NeoForge JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ghastrider-neoforge
          path: neoforge/build/libs/!(*-sources|*-javadoc).jar
