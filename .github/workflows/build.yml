name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: ghastdash-fabric
          path: fabric/build/libs/!(*-sources|*-dev).jar

      - name: Upload NeoForge JAR
        uses: actions/upload-artifact@v4
        with:
          name: ghastdash-neoforge
          path: neoforge/build/libs/!(*-sources|*-dev).jar
