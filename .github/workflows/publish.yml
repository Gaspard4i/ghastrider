name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --stacktrace --parallel

      - name: Publish Fabric
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: fabric/build/libs/!(*-sources|*-javadoc).jar
          name: "GhastRider ${{ github.ref_name }} (Fabric)"
          version: ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: "[26.1,26.2)"
          game-version-filter: releases
          dependencies: fabric-api(required)
          changelog-file: CHANGELOG.md
          retry-attempts: 2
          retry-delay: 10000

      - name: Publish NeoForge
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: neoforge/build/libs/!(*-sources|*-javadoc).jar
          name: "GhastRider ${{ github.ref_name }} (NeoForge)"
          version: ${{ github.ref_name }}
          version-type: release
          loaders: neoforge
          game-versions: "[26.1,26.2)"
          game-version-filter: releases
          changelog-file: CHANGELOG.md
          retry-attempts: 2
          retry-delay: 10000

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: |
            fabric/build/libs/!(*-sources|*-javadoc).jar
            neoforge/build/libs/!(*-sources|*-javadoc).jar
